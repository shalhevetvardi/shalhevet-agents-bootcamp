<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>חייגן אִימפּרוּב</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Rubik", "Assistant", sans-serif; }
  body {
    background: linear-gradient(180deg, #f5f5f7 0%, #ececef 100%);
    color: #1d1d1f;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .container { max-width: 720px; margin: 0 auto; }
  header {
    background: #fff;
    padding: 24px 28px;
    border-radius: 16px;
    margin-bottom: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,.06);
  }
  header h1 { font-size: 26px; margin-bottom: 6px; letter-spacing: -0.3px; }
  header p { color: #6e6e73; font-size: 14px; line-height: 1.5; }
  .controls { display: flex; gap: 8px; margin-top: 16px; }
  button {
    cursor: pointer;
    border: none;
    font-family: inherit;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    transition: all .15s ease;
  }
  .btn-refresh {
    background: #f0f0f2;
    color: #1d1d1f;
  }
  .btn-refresh:hover { background: #e4e4e8; }
  .btn-call {
    background: #30d158;
    color: white;
    padding: 11px 22px;
    font-size: 15px;
    box-shadow: 0 2px 8px rgba(48,209,88,.25);
  }
  .btn-call:hover { background: #28b54b; transform: translateY(-1px); }
  .btn-call:active { transform: translateY(0); }
  .btn-call:disabled { background: #8e8e93; cursor: not-allowed; box-shadow: none; }
  .lead-list { display: flex; flex-direction: column; gap: 10px; }
  .lead-card {
    background: #fff;
    padding: 20px 24px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,.05);
    transition: box-shadow .15s;
  }
  .lead-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.08); }
  .lead-info { flex: 1; min-width: 0; }
  .lead-name { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .lead-meta { color: #6e6e73; font-size: 13px; line-height: 1.7; }
  .lead-phone {
    direction: ltr;
    display: inline-block;
    font-variant-numeric: tabular-nums;
    unicode-bidi: isolate;
  }
  .no-phone { color: #ff3b30; font-weight: 500; }
  .manual-dial {
    background: #fff;
    padding: 20px 24px;
    border-radius: 14px;
    margin-bottom: 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,.05);
  }
  .manual-title {
    font-size: 14px;
    font-weight: 600;
    color: #6e6e73;
    margin-bottom: 10px;
  }
  .manual-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .manual-row input {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    border: 1px solid #d1d1d6;
    border-radius: 8px;
    flex: 1;
    min-width: 140px;
  }
  .manual-row input:focus {
    outline: none;
    border-color: #30d158;
  }
  .empty-state, .loading {
    text-align: center;
    padding: 80px 20px;
    color: #6e6e73;
    background: #fff;
    border-radius: 14px;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid #d1d1d6;
    border-top-color: #1d1d1f;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-left: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1d1d1f;
    color: white;
    padding: 14px 22px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,.2);
    opacity: 0;
    transition: all .25s ease;
    pointer-events: none;
    z-index: 9999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: #ff3b30; }
  .toast.success { background: #30d158; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📞 חייגן אִימפּרוּב</h1>
    <p>לידים מקלנדלי — כל שיחה מוקלטת, מתומללת ומעובדת אוטומטית</p>
    <div class="controls">
      <button class="btn-refresh" onclick="loadLeads()">🔄 רענן</button>
    </div>
  </header>

  <div class="manual-dial">
    <div class="manual-title">חיוג ידני / בדיקה</div>
    <div class="manual-row">
      <input type="tel" id="manualPhone" placeholder="מספר טלפון (למשל 0506421111)" />
      <input type="text" id="manualName" placeholder="שם (לא חובה)" />
      <button class="btn-call" onclick="manualDial()">חייג</button>
    </div>
  </div>
  <div id="list" class="lead-list">
    <div class="loading"><span class="spinner"></span> טוען לידים מקלנדלי...</div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => { t.className = 'toast'; }, 4000);
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const date = d.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: '2-digit' });
  const time = d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
  return `${date} · ${time}`;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function loadLeads() {
  const list = document.getElementById('list');
  list.innerHTML = '<div class="loading"><span class="spinner"></span> טוען לידים...</div>';

  try {
    const r = await fetch('/api/leads');
    const data = await r.json();
    if (!data.ok) throw new Error(data.error || 'שגיאה לא ידועה');

    const leads = data.leads || [];
    if (leads.length === 0) {
      list.innerHTML = '<div class="empty-state">אין פגישות בטווח השבועות הקרובים.</div>';
      return;
    }

    list.innerHTML = '';
    leads.forEach((lead, i) => {
      const hasPhone = !!lead.phone;
      const card = document.createElement('div');
      card.className = 'lead-card';

      const phoneHtml = hasPhone
        ? `<div class="lead-phone">📱 ${escapeHtml(lead.phone)}</div>`
        : `<div class="no-phone">⚠️ לא נמצא מספר טלפון</div>`;

      card.innerHTML = `
        <div class="lead-info">
          <div class="lead-name">${escapeHtml(lead.name)}</div>
          <div class="lead-meta">
            <div>📅 ${formatTime(lead.start_time)} · ${escapeHtml(lead.event_name)}</div>
            ${phoneHtml}
          </div>
        </div>
      `;

      if (hasPhone) {
        const btn = document.createElement('button');
        btn.className = 'btn-call';
        btn.textContent = 'חייג';
        btn.onclick = () => callLead(btn, lead);
        card.appendChild(btn);
      }

      list.appendChild(card);
    });
  } catch (e) {
    list.innerHTML = `<div class="empty-state">שגיאה בטעינה: ${escapeHtml(e.message)}</div>`;
  }
}

async function callLead(btn, lead) {
  const confirmed = confirm(
    `לחייג ל-${lead.name}?\n\nהאייפון שלך יצלצל קודם — תעני, וטוויליו יחבר אותך אל הליד. השיחה תוקלט אוטומטית.`
  );
  if (!confirmed) return;

  btn.disabled = true;
  const origText = btn.textContent;
  btn.textContent = 'מחייג...';

  try {
    const r = await fetch('/api/call', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: lead.name, phone: lead.phone })
    });
    const data = await r.json();
    if (!data.ok) throw new Error(data.error || 'שגיאה');

    showToast(`✓ השיחה בדרך — ענו באייפון`, 'success');
    btn.textContent = '✓ בוצע';
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = origText;
    }, 5000);
  } catch (e) {
    showToast('שגיאה: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = origText;
  }
}

async function manualDial() {
  const phone = document.getElementById('manualPhone').value.trim();
  const name = document.getElementById('manualName').value.trim() || 'חיוג ידני';
  if (!phone) {
    showToast('הכניסי מספר טלפון', 'error');
    return;
  }
  const confirmed = confirm(
    `לחייג ל-${phone}?\n\nהאייפון שלך יצלצל קודם — תעני, וטוויליו יחבר אותך אל המספר. השיחה תוקלט.`
  );
  if (!confirmed) return;

  showToast(`מחייג ל-${phone}...`);
  try {
    const r = await fetch('/api/call', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, phone: phone })
    });
    const data = await r.json();
    if (!data.ok) throw new Error(data.error || 'שגיאה');
    showToast('✓ השיחה בדרך — ענו באייפון', 'success');
  } catch (e) {
    showToast('שגיאה: ' + e.message, 'error');
  }
}

loadLeads();
</script>
</body>
</html>
